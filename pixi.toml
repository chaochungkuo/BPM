[workspace]
channels = ["https://prefix.dev/conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]
preview = ["pixi-build"]

[dependencies]
bpm-cli = { path = "." }

[environments]
default = { features = ["dev"] }

[feature.dev.dependencies]
pytest = ">=8"
pytest-cov = ">=4.1"
ruff = ">=0.5"
black = ">=24.8"
pip = "*"
setuptools = ">=68"
wheel = ">=0.41"

[tasks]
dev-install = 'python -m pip install -e ".[dev]"'
test = 'python -m pip install -e ".[dev]" && pytest'
lint = "ruff check ."
fmt = "black ."
fmt-check = "black --check ."
version-show = "python scripts/version_guard.py show"
version-check = "python scripts/version_guard.py check"
version-sync = "python scripts/version_guard.py sync"

[package]
name = "bpm-cli"
version = "0.1.6"
description = "Bioinformatics Project Manager (BPM) — core CLI"

[package.build]
backend = { name = "pixi-build-python", version = "*" }
channels = ["https://prefix.dev/conda-forge"]

[package.host-dependencies]
python = ">=3.10,<3.13"
setuptools = ">=68"
wheel = ">=0.41"

[package.run-dependencies]
python = ">=3.10,<3.13"
pyyaml = ">=6.0.2,<7"
typer = ">=0.12"
jinja2 = ">=3.1"
rich = ">=13.7"
requests = ">=2.32.5,<3"
